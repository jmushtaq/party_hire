<!DOCTYPE html>
{% load static %}
{% load theme_tags %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Party Hire{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Theme CSS -->
    {% if active_theme == 'default' %}
    <link rel="stylesheet" href="{% static 'css/themes/default/style.css' %}">
    {% elif active_theme == 'elegant' %}
    <link rel="stylesheet" href="{% static 'css/themes/elegant/style.css' %}">
    {% elif active_theme == 'modern' %}
    <link rel="stylesheet" href="{% static 'css/themes/modern/style.css' %}">
    {% else %}
    <link rel="stylesheet" href="{% static 'css/themes/default/style.css' %}">
    {% endif %}
    
    <!-- Flatpickr for date pickers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        /* Ensure footer stays at bottom */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        main {
            flex: 1 0 auto;
        }
        
        footer {
            flex-shrink: 0;
            margin-top: auto;
        }
        
        /* Notification styles */
        .position-fixed {
            position: fixed !important;
        }
        
        /* Quantity widget styles */
        .quantity-widget {
            background: white;
            transition: all 0.2s ease;
        }
        
        .quantity-widget:hover {
            border-color: var(--primary-color, #007bff);
        }
        
        .quantity-widget .quantity-btn {
            color: var(--dark-color, #333);
            transition: all 0.2s ease;
        }
        
        .quantity-widget .quantity-btn:hover {
            background-color: var(--primary-color, #007bff);
            color: white;
        }
        
        .quantity-widget input {
            -moz-appearance: textfield;
        }
        
        .quantity-widget input::-webkit-inner-spin-button,
        .quantity-widget input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Custom alert for remove confirmation */
        .custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            min-width: 300px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translate(-50%, -70%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation and content here... -->
    <!-- Make sure main content is wrapped in <main> tag -->
</body>
</html>
