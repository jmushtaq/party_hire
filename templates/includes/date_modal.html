<div id="dateModal" class="modal-custom">
    <div class="modal-content-custom">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="fas fa-calendar-alt"></i> Select Your Hire Dates</h4>
            <button class="btn-close" onclick="closeDateModal()"></button>
        </div>
        <div class="row">
            <div class="col-md-6">
                <label class="form-label fw-bold">Start Date</label>
                <input type="text" id="modal_start_date" class="form-control" placeholder="Select start date">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">End Date</label>
                <input type="text" id="modal_end_date" class="form-control" placeholder="Select end date">
            </div>
        </div>
        <div id="modal_calendar_container" class="mt-3"></div>
        <div class="mt-3">
            <button class="btn btn-success w-100" onclick="confirmDates()">
                <i class="fas fa-check"></i> Confirm Dates
            </button>
        </div>
    </div>
</div>
