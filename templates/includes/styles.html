    /* Tooltip arrow */
    .date-tooltip::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 8px solid white;

    .date-tooltip::after {

        position: absolute;
        top: -9px;

        border-right: 9px solid transparent;

        z-index: 1070;
    }

    @media (max-width: 768px) {
        .date-tooltip {

            right: 0;
            transform: none;
            min-width: 260px;
        }
        
        .date-tooltip::before,
        .date-tooltip::after {
            left: auto;
            right: 20px;
            transform: none;
        }
    }
