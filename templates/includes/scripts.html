<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
    let modalStartPicker = null;
    let modalEndPicker = null;
    let currentStartDate = '{{ booking_start_date|default:"" }}';
    let currentEndDate = '{{ booking_end_date|default:"" }}';
    
    function openDateModal() {
        const modal = document.getElementById('dateModal');
        modal.classList.add('active');
        
        setTimeout(() => {
            if (!modalStartPicker) {
                modalStartPicker = flatpickr("#modal_start_date", {
                    dateFormat: "Y-m-d",
                    minDate: "today",
                    onChange: function(selectedDates) {
                        if (selectedDates.length) {
                            modalEndPicker.set('minDate', selectedDates[0]);
                        }
                    }
                });
                
                modalEndPicker = flatpickr("#modal_end_date", {
                    dateFormat: "Y-m-d",
                    minDate: "today"
                });
            }
            
            if (currentStartDate) modalStartPicker.setDate(currentStartDate);
            if (currentEndDate) modalEndPicker.setDate(currentEndDate);
        }, 100);
    }
    
    function closeDateModal() {
        document.getElementById('dateModal').classList.remove('active');
    }
    
    function confirmDates() {
        const startDate = modalStartPicker.input.value;
        const endDate = modalEndPicker.input.value;
        
        if (!startDate || !endDate) {
            alert('Please select both start and end dates');
            return;
        }
        
        closeDateModal();
        showLoading();
        
        fetch('/bookings/set-date-range/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ start_date: startDate, end_date: endDate })
        })
        .then(response => response.json())
        .then(data => {
            hideLoading();
            if (data.success) {
                if (data.unavailable_items && data.unavailable_items.length > 0) {
                    alert(`Warning: ${data.unavailable_items.length} item(s) were removed because they are not available on these dates.`);
                }
                window.location.reload();
            } else {
                alert('Error: ' + data.error);
            }
        })
        .catch(error => {
            hideLoading();
            alert('Error setting dates');
        });
    }
    
    function switchTheme(themeName) {
        localStorage.setItem('active_theme', themeName);
        window.location.href = window.location.pathname + '?theme=' + themeName;
    }
    
    function showLoading() {
        document.getElementById('loadingOverlay').classList.add('active');
    }
    
    function hideLoading() {
        document.getElementById('loadingOverlay').classList.remove('active');
    }
    
    function getCookie(name) {
        let value = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    value = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return value;
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const themeParam = urlParams.get('theme');
        if (themeParam) localStorage.setItem('active_theme', themeParam);
    });

    // Date Tooltip Functionality
    const dateDisplay = document.getElementById('dateRangeDisplay');
    const dateTooltip = document.getElementById('dateTooltip');
    let tooltipTimeout;

    if (dateDisplay && dateTooltip) {
        function updateTooltipInfo() {
            const startDateStr = '{{ booking_start_date|default:"" }}';
            const endDateStr = '{{ booking_end_date|default:"" }}';
            
            if (startDateStr && endDateStr) {
                const start = new Date(startDateStr);
                const end = new Date(endDateStr);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const durationDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById('tooltipDuration').textContent = `${durationDays} day${durationDays > 1 ? 's' : ''}`;
                
                const daysUntil = Math.ceil((start - today) / (1000 * 60 * 60 * 24));
                const daysUntilElement = document.getElementById('daysUntilHire');
                
                if (daysUntil < 0) {
                    daysUntilElement.innerHTML = '<i class="fas fa-hourglass-start"></i> Hire period has started';
                    daysUntilElement.style.color = '#e67e22';
                } else if (daysUntil === 0) {
                    daysUntilElement.innerHTML = '<i class="fas fa-play-circle"></i> Hire starts today!';
                    daysUntilElement.style.color = '#27ae60';
                } else if (daysUntil === 1) {
                    daysUntilElement.innerHTML = `<i class="fas fa-hourglass-half"></i> Starts tomorrow`;
                    daysUntilElement.style.color = '#3498db';
                } else {
                    daysUntilElement.innerHTML = `<i class="fas fa-hourglass-half"></i> Starts in ${daysUntil} days`;
                    daysUntilElement.style.color = '#3498db';
                }
            }
        }
        
        dateDisplay.addEventListener('mouseenter', function() {
            clearTimeout(tooltipTimeout);
            updateTooltipInfo();
            dateTooltip.style.display = 'block';
        });
        
        dateDisplay.addEventListener('mouseleave', function() {
            tooltipTimeout = setTimeout(function() {
                dateTooltip.style.display = 'none';
            }, 300);
        });
        
        dateTooltip.addEventListener('mouseenter', function() {
            clearTimeout(tooltipTimeout);
            dateTooltip.style.display = 'block';
        });
        
        dateTooltip.addEventListener('mouseleave', function() {
            tooltipTimeout = setTimeout(function() {
                dateTooltip.style.display = 'none';
            }, 300);
        });
    }
</script>
